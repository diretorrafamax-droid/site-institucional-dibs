<svg viewBox="0 0 520 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="520" height="400" rx="16" fill="var(--surface, #F5F5F5)"/>

  <!-- Hub central circle -->
  <circle cx="260" cy="200" r="60" fill="var(--accent, #19D87D)" opacity="0.06"/>
  <circle cx="260" cy="200" r="45" fill="var(--accent, #19D87D)" opacity="0.08"/>
  <circle cx="260" cy="200" r="30" fill="var(--accent, #19D87D)" opacity="0.12"/>
  <circle cx="260" cy="200" r="16" fill="var(--accent, #19D87D)" opacity="0.2"/>

  <!-- Connection lines from center -->
  <line x1="260" y1="200" x2="100" y2="100" stroke="var(--accent, #19D87D)" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.15"/>
  <line x1="260" y1="200" x2="420" y2="80" stroke="var(--accent, #19D87D)" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.15"/>
  <line x1="260" y1="200" x2="80" y2="280" stroke="var(--accent, #19D87D)" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.15"/>
  <line x1="260" y1="200" x2="440" y2="300" stroke="var(--accent, #19D87D)" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.15"/>
  <line x1="260" y1="200" x2="260" y2="50" stroke="var(--accent, #19D87D)" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.15"/>
  <line x1="260" y1="200" x2="260" y2="360" stroke="var(--accent, #19D87D)" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.15"/>

  <!-- Profile 1 - Developer (top-left) -->
  <circle cx="100" cy="100" r="22" fill="var(--background, #fff)" stroke="var(--accent, #19D87D)" stroke-width="2" opacity="0.7"/>
  <circle cx="100" cy="95" r="8" fill="var(--foreground, #1C1C1C)" opacity="0.12"/>
  <ellipse cx="100" cy="112" rx="12" ry="6" fill="var(--foreground, #1C1C1C)" opacity="0.08"/>
  <rect x="87" y="124" width="26" height="20" rx="4" fill="var(--accent, #19D87D)" opacity="0.08"/>
  <text x="100" y="137" text-anchor="middle" font-size="7" fill="var(--foreground, #1C1C1C)" opacity="0.4" font-family="sans-serif">DEV</text>

  <!-- Profile 2 - Designer (top-right) -->
  <circle cx="420" cy="80" r="22" fill="var(--background, #fff)" stroke="var(--accent, #19D87D)" stroke-width="2" opacity="0.7"/>
  <circle cx="420" cy="75" r="8" fill="var(--foreground, #1C1C1C)" opacity="0.12"/>
  <ellipse cx="420" cy="92" rx="12" ry="6" fill="var(--foreground, #1C1C1C)" opacity="0.08"/>
  <rect x="409" y="104" width="22" height="20" rx="4" fill="var(--accent, #19D87D)" opacity="0.08"/>
  <text x="420" y="117" text-anchor="middle" font-size="7" fill="var(--foreground, #1C1C1C)" opacity="0.4" font-family="sans-serif">UI</text>

  <!-- Profile 3 - Content (bottom-left) -->
  <circle cx="80" cy="280" r="22" fill="var(--background, #fff)" stroke="var(--accent, #19D87D)" stroke-width="2" opacity="0.7"/>
  <circle cx="80" cy="275" r="8" fill="var(--foreground, #1C1C1C)" opacity="0.12"/>
  <ellipse cx="80" cy="292" rx="12" ry="6" fill="var(--foreground, #1C1C1C)" opacity="0.08"/>
  <rect x="68" y="304" width="24" height="20" rx="4" fill="var(--accent, #19D87D)" opacity="0.08"/>
  <text x="80" y="317" text-anchor="middle" font-size="7" fill="var(--foreground, #1C1C1C)" opacity="0.4" font-family="sans-serif">CONTEÚDO</text>

  <!-- Profile 4 - Blockchain (bottom-right) -->
  <circle cx="440" cy="300" r="22" fill="var(--background, #fff)" stroke="var(--accent, #19D87D)" stroke-width="2" opacity="0.7"/>
  <circle cx="440" cy="295" r="8" fill="var(--foreground, #1C1C1C)" opacity="0.12"/>
  <ellipse cx="440" cy="312" rx="12" ry="6" fill="var(--foreground, #1C1C1C)" opacity="0.08"/>
  <rect x="430" y="324" width="20" height="20" rx="4" fill="var(--accent, #19D87D)" opacity="0.08"/>
  <text x="440" y="337" text-anchor="middle" font-size="7" fill="var(--foreground, #1C1C1C)" opacity="0.4" font-family="sans-serif">WEB3</text>

  <!-- Profile 5 - Security (top-center) -->
  <circle cx="260" cy="50" r="22" fill="var(--background, #fff)" stroke="var(--accent, #19D87D)" stroke-width="2" opacity="0.7"/>
  <circle cx="260" cy="45" r="8" fill="var(--foreground, #1C1C1C)" opacity="0.12"/>
  <ellipse cx="260" cy="62" rx="12" ry="6" fill="var(--foreground, #1C1C1C)" opacity="0.08"/>
  <rect x="249" y="74" width="22" height="20" rx="4" fill="var(--accent, #19D87D)" opacity="0.08"/>
  <text x="260" y="87" text-anchor="middle" font-size="7" fill="var(--foreground, #1C1C1C)" opacity="0.4" font-family="sans-serif">SEGURANÇA</text>

  <!-- Profile 6 - Marketing (bottom-center) -->
  <circle cx="260" cy="360" r="22" fill="var(--background, #fff)" stroke="var(--accent, #19D87D)" stroke-width="2" opacity="0.7"/>
  <circle cx="260" cy="355" r="8" fill="var(--foreground, #1C1C1C)" opacity="0.12"/>
  <ellipse cx="260" cy="372" rx="12" ry="6" fill="var(--foreground, #1C1C1C)" opacity="0.08"/>
  <rect x="249" y="384" width="22" height="20" rx="4" fill="var(--accent, #19D87D)" opacity="0.08"/>
  <text x="260" y="397" text-anchor="middle" font-size="7" fill="var(--foreground, #1C1C1C)" opacity="0.4" font-family="sans-serif">MARKETING</text>

  <!-- Central "40+" badge -->
  <text x="260" y="197" text-anchor="middle" font-size="18" font-weight="900" fill="var(--accent, #19D87D)" opacity="0.6" font-family="sans-serif">40+</text>
  <text x="260" y="212" text-anchor="middle" font-size="7" fill="var(--muted, #666)" opacity="0.4" font-family="sans-serif">ESPECIALISTAS</text>

  <!-- Chat/dialog floating -->
  <rect x="135" y="145" width="55" height="24" rx="6" fill="var(--accent, #19D87D)" opacity="0.06"/>
  <text x="162" y="161" text-anchor="middle" font-size="8" fill="var(--muted, #888)" opacity="0.5" font-family="sans-serif">🤝 Colaboração</text>

  <rect x="320" y="148" width="60" height="24" rx="6" fill="var(--accent, #19D87D)" opacity="0.06"/>
  <text x="350" y="164" text-anchor="middle" font-size="8" fill="var(--muted, #888)" opacity="0.5" font-family="sans-serif">🚀 Entregas</text>

  <!-- Decorative dots -->
  <circle cx="50" cy="50" r="3" fill="var(--accent, #19D87D)" opacity="0.06"/>
  <circle cx="470" cy="50" r="3" fill="var(--accent, #19D87D)" opacity="0.06"/>
  <circle cx="50" cy="360" r="3" fill="var(--accent, #19D87D)" opacity="0.06"/>
  <circle cx="470" cy="360" r="3" fill="var(--accent, #19D87D)" opacity="0.06"/>
</svg>

  <circle cx="170" cy="50" r="6" fill="var(--accent, #19D87D)" opacity="0.1"/>
  <circle cx="170" cy="50" r="3" fill="var(--accent, #19D87D)" opacity="0.2"/>
  <circle cx="350" cy="60" r="6" fill="var(--accent, #19D87D)" opacity="0.1"/>
  <circle cx="350" cy="60" r="3" fill="var(--accent, #19D87D)" opacity="0.2"/>
  <circle cx="260" cy="340" r="6" fill="var(--accent, #19D87D)" opacity="0.1"/>
  <circle cx="260" cy="340" r="3" fill="var(--accent, #19D87D)" opacity="0.2"/>
  <circle cx="480" cy="180" r="6" fill="var(--accent, #19D87D)" opacity="0.1"/>
  <circle cx="480" cy="180" r="3" fill="var(--accent, #19D87D)" opacity="0.2"/>
  <circle cx="40" cy="190" r="6" fill="var(--accent, #19D87D)" opacity="0.1"/>
  <circle cx="40" cy="190" r="3" fill="var(--accent, #19D87D)" opacity="0.2"/>

  <!-- Dashed outer connections -->

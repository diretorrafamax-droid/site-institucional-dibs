  <line x1="310" y1="178" x2="380" y2="132" stroke="var(--accent, #19D87D)" stroke-width="2" stroke-dasharray="4 3" opacity="0.3"/>
  <line x1="110" y1="175" x2="210" y2="190" stroke="var(--accent, #19D87D)" stroke-width="2" stroke-dasharray="4 3" opacity="0.3"/>
  <line x1="310" y1="195" x2="410" y2="272" stroke="var(--accent, #19D87D)" stroke-width="2" stroke-dasharray="4 3" opacity="0.3"/>
  <line x1="210" y1="240" x2="110" y2="282" stroke="var(--accent, #19D87D)" stroke-width="2" stroke-dasharray="4 3" opacity="0.3"/>


  <rect x="390" y="144" width="45" height="3" rx="1.5" fill="var(--accent, #19D87D)" opacity="0.15"/>

  <rect x="30" y="250" width="80" height="65" rx="6" fill="var(--background, #fff)" stroke="var(--accent, #19D87D)" stroke-width="2" opacity="0.6"/>
  <rect x="30" y="250" width="80" height="20" rx="6" fill="var(--accent, #19D87D)" opacity="0.08"/>
  <text x="70" y="265" text-anchor="middle" font-size="9" fill="var(--foreground, #1C1C1C)" opacity="0.4" font-family="monospace">BLOCK #8040</text>
  <rect x="40" y="278" width="50" height="3" rx="1.5" fill="var(--accent, #19D87D)" opacity="0.15"/>
  <rect x="40" y="286" width="40" height="3" rx="1.5" fill="var(--accent, #19D87D)" opacity="0.1"/>
  <rect x="40" y="294" width="45" height="3" rx="1.5" fill="var(--accent, #19D87D)" opacity="0.15"/>


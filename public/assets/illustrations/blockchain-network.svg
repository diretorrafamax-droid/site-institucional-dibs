  <rect x="420" y="276" width="40" height="3" rx="1.5" fill="var(--accent, #19D87D)" opacity="0.1"/>
  <rect x="420" y="284" width="45" height="3" rx="1.5" fill="var(--accent, #19D87D)" opacity="0.15"/>


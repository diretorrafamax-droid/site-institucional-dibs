  <rect x="60" y="110" width="80" height="20" rx="6" fill="var(--accent, #19D87D)" opacity="0.08"/>
  <text x="100" y="125" text-anchor="middle" font-size="9" fill="var(--foreground, #1C1C1C)" opacity="0.4" font-family="monospace">BLOCK #8041</text>
  <rect x="70" y="138" width="50" height="3" rx="1.5" fill="var(--accent, #19D87D)" opacity="0.15"/>
  <rect x="70" y="146" width="40" height="3" rx="1.5" fill="var(--accent, #19D87D)" opacity="0.1"/>
  <rect x="70" y="154" width="45" height="3" rx="1.5" fill="var(--accent, #19D87D)" opacity="0.15"/>

  <rect x="380" y="100" width="80" height="65" rx="6" fill="var(--background, #fff)" stroke="var(--accent, #19D87D)" stroke-width="2" opacity="0.6"/>
  <rect x="380" y="100" width="80" height="20" rx="6" fill="var(--accent, #19D87D)" opacity="0.08"/>
  <text x="420" y="115" text-anchor="middle" font-size="9" fill="var(--foreground, #1C1C1C)" opacity="0.4" font-family="monospace">BLOCK #8043</text>

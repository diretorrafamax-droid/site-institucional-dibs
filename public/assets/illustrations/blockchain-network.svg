<svg viewBox="0 0 520 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="520" height="400" rx="16" fill="var(--surface, #F5F5F5)"/>

  <!-- Central block -->
  <rect x="210" y="160" width="100" height="80" rx="8" fill="var(--background, #fff)" stroke="var(--accent, #19D87D)" stroke-width="2.5" opacity="0.9"/>
  <rect x="210" y="160" width="100" height="26" rx="8" fill="var(--accent, #19D87D)" opacity="0.12"/>
  <text x="260" y="178" text-anchor="middle" font-size="11" fill="var(--foreground, #1C1C1C)" opacity="0.5" font-family="monospace">BLOCK #8042</text>
  <rect x="222" y="194" width="76" height="4" rx="2" fill="var(--accent, #19D87D)" opacity="0.2"/>
  <rect x="222" y="204" width="60" height="4" rx="2" fill="var(--accent, #19D87D)" opacity="0.15"/>
  <rect x="222" y="214" width="68" height="4" rx="2" fill="var(--accent, #19D87D)" opacity="0.2"/>
  <rect x="222" y="224" width="40" height="4" rx="2" fill="var(--accent, #19D87D)" opacity="0.15"/>


  <line x1="350" y1="60" x2="310" y2="160" stroke="var(--accent, #19D87D)" stroke-width="1.5" stroke-dasharray="3 4" opacity="0.12"/>
  <line x1="260" y1="340" x2="260" y2="240" stroke="var(--accent, #19D87D)" stroke-width="1.5" stroke-dasharray="3 4" opacity="0.12"/>

  <!-- Shield/lock icon (trust) -->
  <g transform="translate(260, 300)" opacity="0.15">
    <path d="M0 8 L0 0 L12 0 L12 8 Q12 16 6 20 Q0 16 0 8 Z" fill="var(--accent, #19D87D)"/>
    <path d="M4 8 L6 10 L10 5" stroke="var(--background, #fff)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
</svg>
